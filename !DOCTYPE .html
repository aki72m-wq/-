<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学マス Tier表</title>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    :root{
      --bg:#0c1016;
      --panel:#171c25;
      --line:#2b3546;
      --text:#eef3fb;
      --muted:#96a5ba;
      --accent:#69b4ff;
      --danger:#ff7474;
      --shadow:0 10px 28px rgba(0,0,0,.28);
      --radius:16px;
      --icon:78px;
      --gap:12px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--text);
      background:linear-gradient(180deg,#0b0e14 0%, #121824 100%);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    .app{
      max-width:1400px;
      margin:0 auto;
      padding:20px;
    }

    .header{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:14px;
      margin-bottom:16px;
      align-items:flex-start;
    }

    h1{
      margin:0 0 8px;
      font-size:28px;
      line-height:1.2;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.6;
    }

    .panel{
      background:rgba(23,28,37,.96);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .toolbar{
      padding:14px;
      margin-bottom:18px;
    }

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    button, .link-btn{
      appearance:none;
      border:1px solid var(--line);
      background:#18212d;
      color:var(--text);
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      font:inherit;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      transition:.18s ease;
    }

    button:hover, .link-btn:hover{
      transform:translateY(-1px);
      background:#202c3a;
      border-color:#4c6788;
    }

    .primary{
      background:#173551;
      border-color:#2e6eae;
    }

    .danger{
      background:#3f1d25;
      border-color:#974151;
    }

    .status{
      margin-top:10px;
      min-height:20px;
      white-space:pre-wrap;
      color:#90d2ff;
      font-size:13px;
      line-height:1.55;
    }

    .status.error{ color:#ffaeae; }

    details{
      margin-top:14px;
    }

    summary{
      cursor:pointer;
      font-weight:700;
      margin-bottom:10px;
    }

    .hint{
      margin:0 0 10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }

    textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      border:1px solid var(--line);
      background:#0f141d;
      color:var(--text);
      border-radius:12px;
      padding:12px 14px;
      font:inherit;
      outline:none;
    }

    textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(105,180,255,.15);
    }

    .board{
      display:grid;
      gap:12px;
      margin-bottom:18px;
    }

    .tier-row{
      display:grid;
      grid-template-columns:88px 1fr;
      overflow:hidden;
      border-radius:16px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      min-height:126px;
    }

    .tier-label{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:126px;
      font-size:30px;
      font-weight:900;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.25);
      letter-spacing:.04em;
    }

    .dropzone{
      display:flex;
      flex-wrap:wrap;
      align-content:flex-start;
      gap:var(--gap);
      min-height:126px;
      padding:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.01),rgba(255,255,255,.03));
    }

    .pool-panel{
      padding:14px;
    }

    .pool-head{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      margin-bottom:12px;
    }

    .pool-head h2{
      margin:0;
      font-size:18px;
    }

    .count{
      color:var(--muted);
      font-size:13px;
    }

    .item{
      width:96px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:7px;
      user-select:none;
    }

    .avatar{
      position:relative;
      width:var(--icon);
      height:var(--icon);
      border-radius:50%;
      overflow:hidden;
      border:2px solid #3d4a60;
      background:#10151d;
      box-shadow:0 8px 18px rgba(0,0,0,.26);
      flex:0 0 auto;
    }

    .avatar img{
      width:100%;
      height:100%;
      display:block;
      object-fit:cover;
      object-position:center 24%;
      background:#0f141d;
    }

    .avatar.pending{
      background:
        radial-gradient(circle at 30% 30%, #243040 0%, #1a2230 40%, #121822 100%);
    }

    .avatar.pending::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(110deg,
          rgba(255,255,255,0) 25%,
          rgba(255,255,255,.10) 50%,
          rgba(255,255,255,0) 75%);
      transform:translateX(-100%);
      animation:shine 1.6s infinite;
    }

    @keyframes shine{
      to{ transform:translateX(100%); }
    }

    .credit{
      position:absolute;
      right:4px;
      bottom:4px;
      padding:4px 6px;
      border-radius:999px;
      font-size:10px;
      line-height:1;
      color:#fff;
      text-decoration:none;
      background:rgba(0,0,0,.56);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(6px);
    }

    .credit:hover{
      background:rgba(25,35,50,.92);
    }

    .name{
      width:100%;
      font-size:12px;
      line-height:1.35;
      text-align:center;
      word-break:break-word;
      color:var(--text);
    }

    .ghost{ opacity:.35; }
    .dragging{ transform:scale(1.04) rotate(1deg); }

    .footer-note{
      margin-top:12px;
      color:var(--muted);
      font-size:12px;
      line-height:1.6;
    }

    code{
      background:#111723;
      border:1px solid #273244;
      padding:2px 6px;
      border-radius:8px;
    }

    @media (max-width:720px){
      .tier-row{ grid-template-columns:64px 1fr; }
      .tier-label{ min-height:104px; font-size:24px; }
      .dropzone{ min-height:104px; }
      :root{ --icon:68px; }
      .item{ width:84px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>学マス Tier表</h1>
        <p class="sub">
          真白優なし / SS追加済み / 丸アイコンは各キャラの実イラスト。<br>
          同じ画像を複数キャラに使わないように修正済み。
        </p>
      </div>
      <a class="link-btn" href="https://imasgk.gamedbs.jp/" target="_blank" rel="noopener noreferrer">元サイトを開く ↗</a>
    </header>

    <section class="panel toolbar">
      <div class="row">
        <button id="fetchBtn" class="primary" type="button">元サイトから取得</button>
        <button id="rebuildBtn" type="button">最初から再取得</button>
        <button id="saveBtn" type="button">保存</button>
        <button id="resetOrderBtn" type="button">全て未配置へ戻す</button>
        <button id="clearBtn" class="danger" type="button">保存データ削除</button>
      </div>

      <div id="status" class="status"></div>

      <details>
        <summary>自動取得で足りない時の補完</summary>
        <p class="hint">
          <code>imasgk.gamedbs.jp</code> のキャラ一覧部分のHTMLをそのまま貼ると、
          そのHTMLの中から名前の近くにある画像だけを拾って補完します。
        </p>
        <textarea id="htmlInput" placeholder='<a href="/..."><img src="/...png" alt="篠澤広"></a>'></textarea>
        <div class="row" style="margin-top:10px;">
          <button id="applyHtmlBtn" type="button">このHTMLから補完</button>
          <button id="clearHtmlBtn" type="button">入力欄を消す</button>
        </div>
      </details>

      <div class="footer-note">
        引用元画像: <a href="https://imasgk.gamedbs.jp/" target="_blank" rel="noopener noreferrer" style="color:#9fd1ff;">imasgk.gamedbs.jp</a>
      </div>
    </section>

    <main>
      <section id="board" class="board"></section>

      <section class="panel pool-panel">
        <div class="pool-head">
          <h2>未配置</h2>
          <div id="poolCount" class="count">0件</div>
        </div>
        <div id="pool" class="dropzone" data-area="pool"></div>
      </section>
    </main>
  </div>

  <script>
    const ROOT = "https://imasgk.gamedbs.jp/";
    const STORAGE_KEY = "gakumas-tier-real-circle-v5";

    const TIERS = [
      { id: "SS", label: "SS", color: "#ff4d4f" },
      { id: "S",  label: "S",  color: "#ff7b72" },
      { id: "A",  label: "A",  color: "#ffb454" },
      { id: "B",  label: "B",  color: "#ffd166" },
      { id: "C",  label: "C",  color: "#67d6a6" },
      { id: "D",  label: "D",  color: "#5aa8ff" }
    ];

    const IDOLS = [
      "花海咲季",
      "月村手毬",
      "藤田ことね",
      "有村麻央",
      "葛城リーリヤ",
      "倉本千奈",
      "紫雲清夏",
      "篠澤広",
      "姫崎莉波",
      "十王星南",
      "花海佑芽",
      "秦谷美鈴"
    ];

    const NAME_ALIASES = {
      "篠澤広": ["篠沢広", "篠澤 広", "篠沢 広"],
      "葛城リーリヤ": ["葛城 リーリヤ"],
      "十王星南": ["十王 星南"],
      "姫崎莉波": ["姫崎 莉波"],
      "花海咲季": ["花海 咲季"],
      "月村手毬": ["月村 手毬"],
      "藤田ことね": ["藤田 ことね"],
      "有村麻央": ["有村 麻央"],
      "倉本千奈": ["倉本 千奈"],
      "紫雲清夏": ["紫雲 清夏"],
      "花海佑芽": ["花海 佑芽"],
      "秦谷美鈴": ["秦谷 美鈴"]
    };

    const els = {
      board: document.getElementById("board"),
      pool: document.getElementById("pool"),
      poolCount: document.getElementById("poolCount"),
      fetchBtn: document.getElementById("fetchBtn"),
      rebuildBtn: document.getElementById("rebuildBtn"),
      saveBtn: document.getElementById("saveBtn"),
      resetOrderBtn: document.getElementById("resetOrderBtn"),
      clearBtn: document.getElementById("clearBtn"),
      status: document.getElementById("status"),
      htmlInput: document.getElementById("htmlInput"),
      applyHtmlBtn: document.getElementById("applyHtmlBtn"),
      clearHtmlBtn: document.getElementById("clearHtmlBtn")
    };

    let sortables = [];
    let state = normalizeState(loadState() || createInitialState());
    ensureNoDuplicateResolvedImages();

    function blankAvatarSvg() {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
          <defs>
            <radialGradient id="g" cx="30%" cy="30%">
              <stop offset="0%" stop-color="#273445"/>
              <stop offset="55%" stop-color="#18202c"/>
              <stop offset="100%" stop-color="#10151d"/>
            </radialGradient>
          </defs>
          <rect width="256" height="256" fill="url(#g)"/>
        </svg>
      `.trim();
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function idolId(name) {
      return "idol-" + [...name].map(ch => ch.charCodeAt(0).toString(16)).join("");
    }

    function createInitialState() {
      const items = {};
      const order = { pool: [] };
      for (const tier of TIERS) order[tier.id] = [];

      for (const name of IDOLS) {
        const id = idolId(name);
        items[id] = {
          id,
          name,
          img: blankAvatarSvg(),
          pageUrl: "",
          imageUrl: "",
          resolved: false
        };
        order.pool.push(id);
      }

      return { items, order };
    }

    function normalizeState(raw) {
      const base = createInitialState();

      if (raw && raw.items) {
        for (const [id, item] of Object.entries(raw.items)) {
          if (!base.items[id]) continue;
          base.items[id] = {
            ...base.items[id],
            ...item,
            id,
            name: base.items[id].name
          };
        }
      }

      if (raw && raw.order) {
        const next = { pool: [] };
        for (const tier of TIERS) next[tier.id] = [];
        const seen = new Set();

        for (const area of Object.keys(next)) {
          const arr = Array.isArray(raw.order[area]) ? raw.order[area] : [];
          next[area] = arr.filter(id => {
            if (!base.items[id] || seen.has(id)) return false;
            seen.add(id);
            return true;
          });
        }

        for (const id of Object.keys(base.items)) {
          if (!seen.has(id)) next.pool.push(id);
        }

        base.order = next;
      }

      return base;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch {
        return null;
      }
    }

    function saveState(showMessage = false) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        if (showMessage) setStatus("保存しました。");
      } catch {
        setStatus("保存に失敗しました。", true);
      }
    }

    function clearState() {
      localStorage.removeItem(STORAGE_KEY);
    }

    function setStatus(msg = "", isError = false) {
      els.status.textContent = msg;
      els.status.classList.toggle("error", !!isError);
      if (msg) {
        clearTimeout(setStatus._timer);
        setStatus._timer = setTimeout(() => {
          els.status.textContent = "";
          els.status.classList.remove("error");
        }, 5000);
      }
    }

    function absolutize(url, base = ROOT) {
      if (!url) return "";
      try {
        return new URL(url, base).href;
      } catch {
        return url;
      }
    }

    function safeDecode(s = "") {
      try {
        return decodeURIComponent(s);
      } catch {
        return s;
      }
    }

    function normalizeText(s = "") {
      return safeDecode(String(s))
        .replace(/\s+/g, "")
        .replace(/[‐‑–—ーｰ\-・･\/\\()（）【】\[\]「」『』"'`]/g, "")
        .replace(/澤/g, "沢")
        .replace(/﨑/g, "崎")
        .toLowerCase();
    }

    function nameVariants(name) {
      const variants = new Set([name]);
      const alias = NAME_ALIASES[name] || [];
      for (const a of alias) variants.add(a);
      if (name.includes("澤")) variants.add(name.replace(/澤/g, "沢"));
      if (name.includes("沢")) variants.add(name.replace(/沢/g, "澤"));
      variants.add(name.replace(/\s+/g, ""));
      return [...variants];
    }

    function textMatchesName(text, name) {
      const t = normalizeText(text);
      return nameVariants(name).some(v => t.includes(normalizeText(v)));
    }

    function idolMentionCount(text) {
      let count = 0;
      for (const idol of IDOLS) {
        if (textMatchesName(text, idol)) count++;
      }
      return count;
    }

    function getNodeBag(el) {
      if (!el) return "";
      return [
        el.textContent || "",
        el.getAttribute?.("title") || "",
        el.getAttribute?.("aria-label") || "",
        el.getAttribute?.("alt") || "",
        el.getAttribute?.("href") || "",
        el.getAttribute?.("data-name") || ""
      ].join(" ");
    }

    function resetItemImage(item) {
      item.img = blankAvatarSvg();
      item.imageUrl = "";
      item.pageUrl = "";
      item.resolved = false;
    }

    function applyChosenToItem(item, chosen) {
      item.img = chosen.src;
      item.imageUrl = chosen.src;
      item.pageUrl = chosen.pageUrl || ROOT;
      item.resolved = true;
    }

    function ensureNoDuplicateResolvedImages() {
      const seen = new Set();
      for (const item of Object.values(state.items)) {
        if (!item.resolved || !item.imageUrl) continue;
        if (seen.has(item.imageUrl)) {
          resetItemImage(item);
        } else {
          seen.add(item.imageUrl);
        }
      }
    }

    function buildBoard() {
      els.board.innerHTML = "";
      for (const tier of TIERS) {
        const row = document.createElement("section");
        row.className = "tier-row";

        const label = document.createElement("div");
        label.className = "tier-label";
        label.textContent = tier.label;
        label.style.background = tier.color;

        const zone = document.createElement("div");
        zone.className = "dropzone";
        zone.dataset.area = tier.id;

        row.append(label, zone);
        els.board.appendChild(row);
      }
    }

    function getZone(area) {
      return area === "pool"
        ? els.pool
        : document.querySelector(`.dropzone[data-area="${area}"]`);
    }

    function createItemEl(item) {
      const wrap = document.createElement("div");
      wrap.className = "item";
      wrap.dataset.itemId = item.id;

      const avatar = document.createElement("div");
      avatar.className = "avatar" + (item.resolved ? "" : " pending");

      const img = document.createElement("img");
      img.src = item.img || blankAvatarSvg();
      img.alt = item.name;
      img.loading = "lazy";
      img.referrerPolicy = "no-referrer";
      avatar.appendChild(img);

      if (item.resolved && item.pageUrl) {
        const source = document.createElement("a");
        source.className = "credit";
        source.href = item.pageUrl;
        source.target = "_blank";
        source.rel = "noopener noreferrer";
        source.textContent = "引用";
        source.title = "引用元を開く";
        source.addEventListener("click", e => e.stopPropagation());
        avatar.appendChild(source);
      }

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = item.name;

      wrap.append(avatar, name);
      return wrap;
    }

    function render() {
      for (const area of Object.keys(state.order)) {
        const zone = getZone(area);
        if (!zone) continue;
        zone.innerHTML = "";
        for (const id of state.order[area]) {
          const item = state.items[id];
          if (!item) continue;
          zone.appendChild(createItemEl(item));
        }
      }
      els.poolCount.textContent = `${state.order.pool.length}件`;
    }

    function destroySortables() {
      for (const s of sortables) s.destroy();
      sortables = [];
    }

    function syncOrderFromDOM() {
      const next = { pool: [] };
      for (const tier of TIERS) next[tier.id] = [];

      document.querySelectorAll(".dropzone").forEach(zone => {
        const area = zone.dataset.area;
        if (!(area in next)) return;
        next[area] = [...zone.querySelectorAll(".item")]
          .map(el => el.dataset.itemId)
          .filter(id => !!state.items[id]);
      });

      state.order = next;
      saveState();
      render();
    }

    function initSortables() {
      destroySortables();
      document.querySelectorAll(".dropzone").forEach(zone => {
        const sortable = new Sortable(zone, {
          group: "tier-items",
          animation: 180,
          ghostClass: "ghost",
          dragClass: "dragging",
          onEnd() {
            syncOrderFromDOM();
          }
        });
        sortables.push(sortable);
      });
    }

    function resetOrderToPool() {
      state.order = { pool: Object.keys(state.items) };
      for (const tier of TIERS) state.order[tier.id] = [];
      render();
      saveState();
      setStatus("すべて未配置へ戻しました。");
    }

    function unresolvedItems() {
      return Object.values(state.items).filter(v => !v.resolved);
    }

    function getImageSrc(img, baseUrl) {
      const direct =
        img.getAttribute("src") ||
        img.getAttribute("data-src") ||
        img.getAttribute("data-original") ||
        img.getAttribute("data-lazy-src") ||
        img.getAttribute("data-image") ||
        "";

      if (direct) return absolutize(direct, baseUrl);

      const srcset = img.getAttribute("srcset") || img.getAttribute("data-srcset") || "";
      if (srcset) {
        const first = srcset.split(",")[0].trim().split(/\s+/)[0];
        return absolutize(first, baseUrl);
      }
      return "";
    }

    function dedupeBest(list, keyFn) {
      const map = new Map();
      for (const item of list) {
        const key = keyFn(item);
        if (!key) continue;
        const prev = map.get(key);
        if (!prev || item.score > prev.score) map.set(key, item);
      }
      return [...map.values()];
    }

    function findMinimalMatchBlocks(doc, itemName) {
      const selector = "a,article,li,section,div,tr,td";
      const nodes = [...doc.querySelectorAll(selector)];

      const matched = nodes.filter(el => {
        const bag = getNodeBag(el);
        if (!textMatchesName(bag, itemName)) return false;
        if (!el.querySelector("img")) return false;

        const mention = idolMentionCount(bag);
        if (mention === 0) return false;
        if (mention > 2) return false;

        const len = normalizeText(bag).length;
        if (len > 160 && mention > 1) return false;

        return true;
      });

      return matched.filter(el => {
        const descendants = [...el.querySelectorAll(selector)];
        return !descendants.some(child => {
          if (child === el) return false;
          const bag = getNodeBag(child);
          return textMatchesName(bag, itemName)
            && child.querySelector("img")
            && idolMentionCount(bag) <= 2;
        });
      });
    }

    function collectDirectImageCandidates(doc, pageUrl, itemName, detailMode = false) {
      const out = [];

      for (const block of findMinimalMatchBlocks(doc, itemName)) {
        const bag = getNodeBag(block);
        const mention = idolMentionCount(bag);
        const anchor = block.matches("a[href]") ? block : block.querySelector("a[href]");
        const href = anchor ? absolutize(anchor.getAttribute("href"), pageUrl) : pageUrl;
        const decodedHref = safeDecode(href);

        for (const img of block.querySelectorAll("img")) {
          const src = getImageSrc(img, pageUrl);
          if (!src) continue;

          let score = detailMode ? 70 : 85;

          if (mention === 1) score += 45;
          if (mention === 2) score -= 8;

          if (textMatchesName(img.getAttribute("alt") || "", itemName)) score += 45;
          if (textMatchesName(img.getAttribute("title") || "", itemName)) score += 28;
          if (textMatchesName(decodedHref, itemName)) score += 20;

          if (/(banner|logo|header|footer|bg|background)/i.test(src)) score -= 50;
          if (/(icon|thumb|face|avatar|idol|chara|character|card)/i.test(src)) score += 8;

          const w = parseInt(img.getAttribute("width") || "0", 10);
          const h = parseInt(img.getAttribute("height") || "0", 10);
          if (w && h) {
            if (w < 40 || h < 40) score -= 20;
            if (w <= 400 && h <= 400) score += 4;
            if (Math.abs(w - h) <= 80) score += 4;
          }

          out.push({
            src,
            pageUrl: href,
            score
          });
        }
      }

      for (const img of [...doc.images]) {
        const anchor = img.closest("a[href]");
        const href = anchor ? absolutize(anchor.getAttribute("href"), pageUrl) : pageUrl;
        const bag = [
          img.getAttribute("alt") || "",
          img.getAttribute("title") || "",
          safeDecode(href)
        ].join(" ");

        if (!textMatchesName(bag, itemName)) continue;

        const src = getImageSrc(img, pageUrl);
        if (!src) continue;

        let score = 95;
        if (textMatchesName(img.getAttribute("alt") || "", itemName)) score += 45;
        if (textMatchesName(img.getAttribute("title") || "", itemName)) score += 24;
        if (/(banner|logo|header|footer|bg|background)/i.test(src)) score -= 50;

        out.push({
          src,
          pageUrl: href,
          score
        });
      }

      return dedupeBest(out, v => v.src).sort((a, b) => b.score - a.score);
    }

    function collectDetailPageCandidates(doc, pageUrl, itemName) {
      const out = [];

      for (const a of [...doc.querySelectorAll("a[href]")]) {
        const hrefRaw = a.getAttribute("href") || "";
        if (!hrefRaw || hrefRaw.startsWith("#") || /^javascript:/i.test(hrefRaw)) continue;

        const href = absolutize(hrefRaw, pageUrl);
        if (!href.startsWith(ROOT)) continue;

        const bag = [
          getNodeBag(a),
          a.querySelector("img")?.getAttribute("alt") || "",
          a.querySelector("img")?.getAttribute("title") || "",
          safeDecode(href)
        ].join(" ");

        if (!textMatchesName(bag, itemName)) continue;

        const mention = idolMentionCount(bag);
        let score = 60;

        if (mention === 1) score += 45;
        if (mention > 1) score -= 20 * (mention - 1);
        if (a.querySelector("img")) score += 12;
        if (textMatchesName(safeDecode(href), itemName)) score += 20;

        out.push({ href, score });
      }

      return dedupeBest(out, v => v.href).sort((a, b) => b.score - a.score);
    }

    function extractMetaImageCandidate(doc, pageUrl, itemName) {
      const meta =
        doc.querySelector('meta[property="og:image"]') ||
        doc.querySelector('meta[name="twitter:image"]') ||
        doc.querySelector('meta[property="twitter:image"]');

      if (!meta) return null;

      const src = absolutize(meta.getAttribute("content") || "", pageUrl);
      if (!src) return null;

      const titleBag = [
        doc.title || "",
        doc.querySelector('meta[property="og:title"]')?.getAttribute("content") || "",
        doc.querySelector('meta[name="twitter:title"]')?.getAttribute("content") || "",
        doc.querySelector("h1")?.textContent || ""
      ].join(" ");

      let score = 40;
      if (textMatchesName(titleBag, itemName)) score += 45;
      if (/(banner|logo|header|footer|bg|background)/i.test(src)) score -= 35;

      return { src, pageUrl, score };
    }

    function collectInternalLinks(doc, pageUrl) {
      const out = [];

      for (const a of [...doc.querySelectorAll("a[href]")]) {
        const hrefRaw = a.getAttribute("href") || "";
        if (!hrefRaw || hrefRaw.startsWith("#") || /^javascript:/i.test(hrefRaw)) continue;

        const href = absolutize(hrefRaw, pageUrl);
        if (!href.startsWith(ROOT)) continue;

        const bag = [
          getNodeBag(a),
          a.querySelector("img")?.getAttribute("alt") || "",
          a.querySelector("img")?.getAttribute("title") || "",
          safeDecode(href)
        ].join(" ");

        let score = 0;
        const mention = idolMentionCount(bag);

        if (mention >= 1) score += 20 + mention * 8;
        if (/(idol|アイドル|一覧|list|profile|プロフィール|character|chara|card|カード)/i.test(bag)) score += 12;
        if (a.querySelector("img")) score += 4;

        out.push({ href, score });
      }

      return dedupeBest(out, v => v.href).sort((a, b) => b.score - a.score);
    }

    async function fetchHtml(url) {
      const proxies = [
        u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        u => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(u)}`
      ];

      for (const make of proxies) {
        try {
          const res = await fetch(make(url), { cache: "no-store" });
          if (!res.ok) continue;
          const text = await res.text();
          if (text && /<html|<body|<img|<a/i.test(text)) return text;
        } catch {}
      }
      throw new Error("fetch failed");
    }

    async function fetchDoc(url) {
      const html = await fetchHtml(url);
      return new DOMParser().parseFromString(html, "text/html");
    }

    function chooseAssignments(candidateMap) {
      const result = new Map();
      const usedImages = new Set();

      const idolIds = Object.keys(candidateMap);
      const remaining = new Set(idolIds);

      let changed = true;
      while (changed) {
        changed = false;
        for (const idolId of [...remaining]) {
          const available = (candidateMap[idolId] || []).filter(c => !usedImages.has(c.src));
          if (available.length === 1) {
            result.set(idolId, available[0]);
            usedImages.add(available[0].src);
            remaining.delete(idolId);
            changed = true;
          }
        }
      }

      const edges = [];
      for (const idolId of remaining) {
        for (const c of candidateMap[idolId] || []) {
          edges.push({ idolId, ...c });
        }
      }

      edges.sort((a, b) => b.score - a.score);

      for (const e of edges) {
        if (result.has(e.idolId)) continue;
        if (usedImages.has(e.src)) continue;
        result.set(e.idolId, { src: e.src, pageUrl: e.pageUrl, score: e.score });
        usedImages.add(e.src);
      }

      return result;
    }

    async function gatherBaseDocs() {
      const rootDoc = await fetchDoc(ROOT);
      const docs = [{ doc: rootDoc, url: ROOT }];
      const listPages = collectInternalLinks(rootDoc, ROOT).slice(0, 8);

      for (const link of listPages) {
        try {
          const doc = await fetchDoc(link.href);
          docs.push({ doc, url: link.href });
        } catch {}
      }

      return docs;
    }

    async function buildCandidateMap(baseDocs) {
      const candidateMap = {};

      for (const item of Object.values(state.items)) {
        setStatus(`候補収集中… ${item.name}`);
        let directCandidates = [];
        let detailPageCandidates = [];

        for (const source of baseDocs) {
          directCandidates.push(...collectDirectImageCandidates(source.doc, source.url, item.name, false));
          detailPageCandidates.push(...collectDetailPageCandidates(source.doc, source.url, item.name));
        }

        directCandidates = dedupeBest(directCandidates, v => v.src).sort((a, b) => b.score - a.score);
        detailPageCandidates = dedupeBest(detailPageCandidates, v => v.href).sort((a, b) => b.score - a.score);

        const finalCandidates = [...directCandidates];

        for (const page of detailPageCandidates.slice(0, 4)) {
          try {
            const doc = await fetchDoc(page.href);
            const detailCandidates = [];
            const metaCandidate = extractMetaImageCandidate(doc, page.href, item.name);
            if (metaCandidate) detailCandidates.push(metaCandidate);
            detailCandidates.push(...collectDirectImageCandidates(doc, page.href, item.name, true));
            finalCandidates.push(...detailCandidates);
          } catch {}
        }

        candidateMap[item.id] = dedupeBest(finalCandidates, v => v.src)
          .filter(c => c.score >= 60)
          .sort((a, b) => b.score - a.score)
          .slice(0, 8);
      }

      return candidateMap;
    }

    async function resolveImages({ force = false } = {}) {
      try {
        if (force) {
          for (const item of Object.values(state.items)) {
            resetItemImage(item);
          }
          render();
          saveState();
        }

        setStatus("元サイトからキャラごとの画像を取得中…");

        const baseDocs = await gatherBaseDocs();
        const candidateMap = await buildCandidateMap(baseDocs);
        const assignments = chooseAssignments(candidateMap);

        for (const item of Object.values(state.items)) {
          const chosen = assignments.get(item.id);
          if (chosen) {
            applyChosenToItem(item, chosen);
          } else {
            resetItemImage(item);
          }
        }

        ensureNoDuplicateResolvedImages();
        render();
        saveState();

        const missing = unresolvedItems().map(v => v.name);
        if (missing.length) {
          setStatus(
            `取得完了: ${Object.keys(state.items).length - missing.length}/${Object.keys(state.items).length}件\n` +
            `未取得: ${missing.join("、")}\n` +
            `足りない場合は下のHTML補完にキャラ一覧部分を貼ってください。`
          );
        } else {
          setStatus("全キャラの画像を取得しました。");
        }
      } catch (e) {
        setStatus("画像取得に失敗しました。HTML補完を使ってください。", true);
      }
    }

    function applyHtmlSupplement(html) {
      try {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const candidateMap = {};

        for (const item of Object.values(state.items)) {
          candidateMap[item.id] = collectDirectImageCandidates(doc, ROOT, item.name, true)
            .filter(c => c.score >= 60)
            .slice(0, 8);
        }

        const assignments = chooseAssignments(candidateMap);

        let updated = 0;
        for (const item of Object.values(state.items)) {
          const chosen = assignments.get(item.id);
          if (!chosen) continue;
          applyChosenToItem(item, chosen);
          updated++;
        }

        ensureNoDuplicateResolvedImages();
        render();
        saveState();

        if (updated > 0) {
          setStatus(`${updated}件ぶん補完しました。`);
        } else {
          setStatus("一致する画像を見つけられませんでした。", true);
        }
      } catch {
        setStatus("HTMLの解析に失敗しました。", true);
      }
    }

    function bindEvents() {
      els.fetchBtn.addEventListener("click", () => resolveImages({ force: false }));
      els.rebuildBtn.addEventListener("click", () => resolveImages({ force: true }));
      els.saveBtn.addEventListener("click", () => {
        syncOrderFromDOM();
        saveState(true);
      });
      els.resetOrderBtn.addEventListener("click", resetOrderToPool);

      els.clearBtn.addEventListener("click", () => {
        const ok = confirm("保存データを削除します。配置と取得済み画像が消えます。よろしいですか？");
        if (!ok) return;
        clearState();
        state = normalizeState(createInitialState());
        render();
        setStatus("保存データを削除しました。");
      });

      els.applyHtmlBtn.addEventListener("click", () => {
        const html = els.htmlInput.value.trim();
        if (!html) {
          setStatus("HTMLを貼ってください。", true);
          return;
        }
        applyHtmlSupplement(html);
      });

      els.clearHtmlBtn.addEventListener("click", () => {
        els.htmlInput.value = "";
      });
    }

    function init() {
      buildBoard();
      render();
      initSortables();
      bindEvents();
      if (unresolvedItems().length) {
        resolveImages({ force: false });
      }
    }

    init();
  </script>
